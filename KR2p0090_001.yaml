body:
  text: 馬王堆漢墓帛書足臂十一脈灸經釋文足足泰陽溫出外踝窶中上貫膊出於𦛱枝之下胂其直者貫臀夾脊出項上於豆枝顏下之耳其直者貫目內漬之鼻其病病足小指廢膞痛𦛱䜌脽痛産寺要痛夾脊痛痛項痛手痛顏寒産聾目痛數癲疾諸病此物者皆久泰陽足少陽出於踝前枝於骨間上貫膝外兼出於股外兼出脅枝之肩薄其直者貫腋出於項耳出腩出目外漬其病病足小指次指廢胻外兼痛胻寒膝外兼痛股外兼痛脾外兼痛脅痛頭頸痛産馬缺盆痛瘦聾腩痛耳前痛目外漬痛脅外穜諸病此物者皆久少陽足陽明循胻中上貫膝中出股夾少腹上出乳內兼出膉夾口以上之鼻其病病足中指廢胻痛膝中穜腹穜乳內兼痛外穜頯痛數癲熱汗出脞瘦搔顏寒諸病此物者皆久陽明足少陰出內踝窶中上貫膊入𦛱出股入腹循脊內上兼出肝入胠毄舌本其病病足熱膞內痛股內痛腹街脊內兼痛肝痛心痛煩心洇舌輅坼旦疸尚氣數𣎅牧牧默默耆卧以咳諸病此物者皆久足少陰溫足泰陽陰出大指內兼骨蔡出內踝上兼循胻內兼上膝內兼出股內兼其病病足大指廢胻內兼痛股內痛腹痛腹張復不耆食善意心煩善肘諸病此物者皆久足泰陰足帣陰循大指間以上出胻內兼上踝八寸交泰陰循股內上入脞間其病病脞瘦多弱耆飲足柎穜疾畀諸病此物者皆久帣陰溫皆有此五病者有煩心死三陰之病亂不過十日死循如三人參舂不過三日死溫脈絶如食頃不過三日死煩心有腹張死不得卧有煩心死唐泄恆出死三陰病雜以陽病可治陽病北如流湯死陽病折骨絶筋而無陰病不死
