body:
  text: 馬王堆漢墓帛書足臂十一脈灸經釋文臂臂泰陰循筋上兼以奏臑內出夜內兼之心其病心痛心煩而意諸病此物者皆久臂泰陰臂少陰循筋下兼出臑內下兼出夜奏脅其病脅痛諸病此物者皆久臂少陰臂泰陽出小指循骨下兼出臑下兼出肩外兼出項目外漬其病臂外兼痛諸病此物者皆久臂泰陽臂少陽出中指循臂上骨下兼奏耳其病産聾頰痛諸病此物者皆久臂少陽之臂陽明出中指間循骨上兼出臑外廉上奏𦝧之口其病病齒痛諸病此物者皆久臂陽明上足六手五
